<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Question Paper — Pitthugram</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
  <link rel="stylesheet" href="./pitthugram.css">
  <style>
    .upload-page { max-width: 760px; margin: 2.5rem auto; padding: 0 1rem 4rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.25rem; }
    .page-sub   { color: var(--text-secondary); font-size: 0.93rem; margin-bottom: 2rem; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border-light);
      border-radius: var(--radius-lg);
      background: var(--bg-elevated);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
    }
    .drop-zone.drag-over,
    .drop-zone:hover { border-color: var(--primary); background: var(--bg-card); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 2.8rem; color: var(--primary); margin-bottom: 0.75rem; display: block; }
    .drop-title { font-size: 1.05rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.35rem; }
    .drop-hint  { font-size: 0.85rem; color: var(--text-secondary); }
    .drop-hint span { color: var(--primary); font-weight: 500; }

    /* File list */
    .file-list { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .file-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--bg-elevated); border: 1.5px solid var(--border-light);
      border-radius: var(--radius-md); padding: 0.7rem 1rem;
    }
    .file-item i { font-size: 1.3rem; color: var(--primary); flex-shrink: 0; }
    .file-name { flex: 1; font-size: 0.9rem; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 0.8rem; color: var(--text-secondary); flex-shrink: 0; }
    .file-remove { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0.2rem; border-radius: var(--radius-sm); transition: color 0.2s; }
    .file-remove:hover { color: var(--danger); }

    /* Form card */
    .form-card {
      background: var(--bg-elevated); border: 1.5px solid var(--border-light);
      border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 1.5rem;
    }
    .form-card h3 { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); margin-bottom: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.83rem; font-weight: 500; color: var(--text-secondary); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.7rem 0.875rem;
      background: var(--bg-input, #1a1a1a);
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit; font-size: 0.9rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(244,0,9,0.12);
    }

    /* Progress */
    .progress-wrap { margin-top: 1.5rem; display: none; }
    .progress-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
    .progress-bar { height: 6px; background: var(--bg-card); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

    /* Status card */
    .status-card {
      display: none; margin-top: 1.5rem;
      border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
      border: 1.5px solid var(--border-light);
    }
    .status-card.success { border-color: var(--success); background: rgba(34,197,94,0.07); }
    .status-card.error   { border-color: var(--danger);  background: rgba(244,0,9,0.07); }
    .status-card .status-title { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem; }
    .status-card.success .status-title { color: var(--success); }
    .status-card.error   .status-title { color: var(--danger); }
    .status-meta { font-size: 0.83rem; color: var(--text-secondary); margin-top: 0.4rem; }

    /* Submit row */
    .submit-row { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }

    /* Confidence badge */
    .conf-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.8rem; font-weight: 600; padding: 0.25rem 0.65rem;
      border-radius: 99px;
    }
    .conf-badge.high   { background: rgba(34,197,94,0.15); color: #22c55e; }
    .conf-badge.medium { background: rgba(234,179,8,0.15);  color: #eab308; }
    .conf-badge.low    { background: rgba(244,0,9,0.15);    color: var(--danger); }
  </style>
</head>
<body>

<!-- Auth gate -->
<div id="authGate" style="display:none; position:fixed; inset:0; background:var(--bg-base); z-index:999; align-items:center; justify-content:center;">
  <div style="text-align:center;">
    <img src="./logo.png" alt="Pitthugram" style="height:48px; margin-bottom:1.5rem;">
    <p style="color:var(--text-secondary); margin-bottom:1.25rem;">You must be logged in to access this page.</p>
    <a href="./index.html" class="btn btn-primary"><i class="ph ph-sign-in"></i> Go to Login</a>
  </div>
</div>

<!-- Navbar -->
<header class="navbar">
  <div class="container nav-inner">
    <a href="./quiz-builder.html" class="logo">
      <img src="./logo.png" alt="Pitthugram">
    </a>
    <div class="nav-actions">
      <a href="./quiz-builder.html" class="btn btn-outline btn-sm">
        <i class="ph ph-house"></i> Dashboard
      </a>
      <button class="btn btn-outline btn-sm" onclick="logout()">
        <i class="ph ph-sign-out"></i> Logout
      </button>
    </div>
  </div>
</header>

<!-- Main content -->
<main id="uploadContent" style="display:none;">
  <div class="upload-page">
    <p class="page-title"><i class="ph ph-upload-simple"></i> Upload Question Paper</p>
    <p class="page-sub">Upload scanned images or PDFs. Our system will extract MCQs automatically.</p>

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple>
      <i class="ph ph-cloud-arrow-up drop-icon"></i>
      <p class="drop-title">Drop files here or <span>browse</span></p>
      <p class="drop-hint">Supports PDF, PNG, JPG &nbsp;·&nbsp; Max 10 MB per file &nbsp;·&nbsp; Up to 5 files</p>
    </div>

    <!-- File list -->
    <div class="file-list" id="fileList"></div>

    <!-- Metadata form -->
    <div class="form-card" id="metaForm" style="display:none;">
      <h3><i class="ph ph-note-pencil"></i> Paper Details</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Subject *</label>
          <select id="subject" onchange="updateChapters()">
            <option value="">Select subject</option>
            <option>Physics</option><option>Chemistry</option><option>Mathematics</option>
            <option>Biology</option><option>English</option><option>Hindi</option>
            <option>Social Studies</option><option>Science</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Class *</label>
          <select id="classLevel" onchange="updateChapters()">
            <option value="">Select class</option>
            <option>Class 6</option><option>Class 7</option><option>Class 8</option>
            <option>Class 9</option><option>Class 10</option><option>Class 11</option>
            <option>Class 12</option><option>JEE</option><option>NEET</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Chapter *</label>
          <select id="unit">
            <option value="">Select chapter</option>
          </select>
        </div>
        <div class="form-group">
          <label>Topic</label>
          <select id="topic">
            <option value="">Select topic (optional)</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:1rem;">
        <label>Notes for reviewer (optional)</label>
        <textarea id="notes" rows="2" placeholder="Any special instructions for the reviewer..."></textarea>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressText">Uploading...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- Status -->
    <div class="status-card" id="statusCard">
      <div class="status-title" id="statusTitle"></div>
      <div class="status-meta" id="statusMeta"></div>
    </div>

    <!-- Submit -->
    <div class="submit-row" id="submitRow" style="display:none;">
      <button class="btn btn-outline btn-sm" onclick="clearAll()">
        <i class="ph ph-x"></i> Clear
      </button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitJob()">
        <i class="ph ph-paper-plane-tilt"></i> Submit for Processing
      </button>
    </div>
  </div>
</main>

<script>
  // n8n endpoints. The browser holds NO storage credentials.
  // Presign returns short-lived IDrive upload/download URLs; process runs the OCR/AI pipeline.
  const N8N_PRESIGN  = 'https://container001.pitthugram.com/webhook/mcq-presign';
  const N8N_WEBHOOK  = 'https://container001.pitthugram.com/webhook/mcq-process';

  // Supabase B — publishable (anon) key only, read-only lookups. Safe to ship in the browser.
  const SUPA_B_URL = 'https://zqrswemxmhjaylsuulyu.supabase.co';
  const SUPA_B_PUB = 'sb_publishable_8Y62WSnJwGidHS591ofDiw_gbzmTGAQ';

  let currentUser = null;
  let selectedFiles = [];

  // Chapter & topic data by subject & class
  const curriculumData = {
    'Physics': {
      'Class 11': ['Mechanics', 'Thermodynamics', 'Waves & Oscillations', 'Electrostatics', 'Magnetism'],
      'Class 12': ['Electric Current', 'Optics', 'Modern Physics', 'Semiconductors', 'Communication'],
      'JEE': ['Mechanics', 'Heat & Thermodynamics', 'Waves', 'Electrostatics', 'Magnetism', 'Current Electricity', 'Optics', 'Modern Physics'],
      'NEET': ['Motion & Force', 'Work & Energy', 'Rotational Motion', 'Gravitation', 'Oscillations', 'Waves', 'Electrostatics', 'Magnetism', 'Optics', 'Modern Physics']
    },
    'Chemistry': {
      'Class 11': ['Basic Concepts', 'Atomic Structure', 'Chemical Bonding', 'Thermodynamics', 'Equilibrium', 'Redox Reactions'],
      'Class 12': ['Solutions', 'Electrochemistry', 'Chemical Kinetics', 'Coordination Compounds', 'Organic Chemistry', 'Polymers'],
      'JEE': ['Atomic Structure', 'Periodic Table', 'Bonding', 'Thermodynamics', 'Equilibrium', 'Redox', 'Solutions', 'Electrochemistry', 'Kinetics', 'General Organic Chemistry', 'Hydrocarbons', 'Alcohols & Ethers'],
      'NEET': ['Atomic Structure', 'Chemical Bonding', 'States of Matter', 'Thermodynamics', 'Equilibrium', 'Redox Reactions', 'Hydrogen', 'S-Block Elements', 'P-Block Elements', 'D-Block Elements', 'Coordination Compounds', 'Organic Chemistry', 'Biomolecules']
    },
    'Mathematics': {
      'Class 11': ['Sets & Relations', 'Functions', 'Trigonometry', 'Linear Equations', 'Inequalities', 'Sequences & Series'],
      'Class 12': ['Relations & Functions', 'Inverse Trigonometry', 'Matrices', 'Determinants', 'Continuity & Differentiability', 'Derivatives', 'Integrals', 'Differential Equations', 'Vectors', '3D Geometry'],
      'JEE': ['Sets', 'Relations', 'Inequalities', 'Quadratic Equations', 'Sequences & Series', 'Trigonometry', 'Complex Numbers', 'Logarithms', 'Limits', 'Derivatives', 'Integrals', 'Differential Equations', 'Vectors', '3D Geometry', 'Straight Lines', 'Circles', 'Conic Sections', 'Permutations & Combinations', 'Probability'],
      'NEET': ['Sets & Logic', 'Relations & Functions', 'Trigonometry', 'Quadratic Equations', 'Sequences & Series', 'Straight Lines', 'Circles', 'Conic Sections', 'Statistics', 'Probability', 'Mathematical Reasoning']
    },
    'Biology': {
      'Class 11': ['Cell Structure', 'Cell Division', 'Plant Physiology', 'Animal Physiology', 'Diversity of Life'],
      'Class 12': ['Genetics', 'Evolution', 'Ecology', 'Biotechnology', 'Human Reproduction', 'Human Health'],
      'NEET': ['Diversity', 'Structural Organization', 'Cell Biology', 'Genetics', 'Molecular Biology', 'Plant Anatomy', 'Plant Physiology', 'Human Anatomy', 'Human Physiology', 'Reproduction', 'Development', 'Ecology', 'Evolution', 'Biotechnology', 'Human Health']
    }
  };

  function updateChapters() {
    const subject = document.getElementById('subject').value;
    const cls = document.getElementById('classLevel').value;
    const chapterSelect = document.getElementById('unit');
    const topicSelect = document.getElementById('topic');

    chapterSelect.innerHTML = '<option value="">Select chapter</option>';
    topicSelect.innerHTML = '<option value="">Select topic (optional)</option>';

    if (subject && cls && curriculumData[subject]?.[cls]) {
      const chapters = curriculumData[subject][cls];
      chapters.forEach(ch => {
        const opt = document.createElement('option');
        opt.value = ch;
        opt.textContent = ch;
        chapterSelect.appendChild(opt);
      });
    }
  }

  // ── Auth ────────────────────────────────────────────────
  function checkAuth() {
    const token = localStorage.getItem('pg_access_token');
    const user  = localStorage.getItem('pg_user');
    if (!token || !user) {
      document.getElementById('authGate').style.display = 'flex';
      document.getElementById('uploadContent').style.display = 'none';
      return false;
    }
    currentUser = JSON.parse(user);
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('uploadContent').style.display = 'block';
    return true;
  }

  function logout() {
    ['pg_access_token','pg_refresh_token','pg_user','pg_role'].forEach(k => localStorage.removeItem(k));
    window.location.href = './index.html';
  }

  // ── File handling ───────────────────────────────────────
  const dropZone  = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

  function addFiles(files) {
    const allowed = ['application/pdf','image/png','image/jpeg','image/webp'];
    files.forEach(f => {
      if (!allowed.includes(f.type))   { showStatus('error', 'Unsupported file type', f.name + ' is not supported.'); return; }
      if (f.size > 10 * 1024 * 1024)  { showStatus('error', 'File too large', f.name + ' exceeds 10 MB.'); return; }
      if (selectedFiles.length >= 5)   { showStatus('error', 'Too many files', 'Maximum 5 files per submission.'); return; }
      if (selectedFiles.find(x => x.name === f.name && x.size === f.size)) return;
      selectedFiles.push(f);
    });
    renderFileList();
  }

  function renderFileList() {
    const list = document.getElementById('fileList');
    list.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const icon = f.type === 'application/pdf' ? 'ph-file-pdf' : 'ph-image';
      const size = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+' MB' : (f.size/1024).toFixed(0)+' KB';
      const el = document.createElement('div');
      el.className = 'file-item';
      el.innerHTML = `
        <i class="ph ${icon}"></i>
        <span class="file-name">${f.name}</span>
        <span class="file-size">${size}</span>
        <button class="file-remove" onclick="removeFile(${i})" title="Remove"><i class="ph ph-x"></i></button>`;
      list.appendChild(el);
    });
    const hasFiles = selectedFiles.length > 0;
    document.getElementById('metaForm').style.display  = hasFiles ? 'block' : 'none';
    document.getElementById('submitRow').style.display = hasFiles ? 'flex'  : 'none';
    if (!hasFiles) document.getElementById('statusCard').style.display = 'none';
  }

  function removeFile(i) { selectedFiles.splice(i, 1); renderFileList(); }

  function clearAll() {
    selectedFiles = [];
    fileInput.value = '';
    ['subject','unit','topic','notes','classLevel'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    updateChapters();
    document.getElementById('statusCard').style.display  = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    renderFileList();
  }

  // ── Upload & submit ─────────────────────────────────────
  async function submitJob() {
    if (!selectedFiles.length) return;
    const subject = document.getElementById('subject').value;
    const cls     = document.getElementById('classLevel').value;
    const unit    = document.getElementById('unit').value;
    if (!subject || !cls || !unit) { showStatus('error', 'Required fields missing', 'Please select Subject, Class, and Chapter before submitting.'); return; }

    setLoading(true);
    showProgress(5, 'Preparing upload...');

    try {
      // Resolve the institute for this teacher (login token is Supabase A; institute lives in Supabase B)
      let instituteId = currentUser.institute_id;
      if (!instituteId) {
        const tRes = await fetch(`${SUPA_B_URL}/rest/v1/teachers?id=eq.${currentUser.id}&select=institute_id`, {
          headers: { apikey: SUPA_B_PUB, Authorization: 'Bearer ' + SUPA_B_PUB }
        });
        const tRows = await tRes.json();
        instituteId = tRows && tRows[0] && tRows[0].institute_id;
      }
      if (!instituteId) throw new Error('Your account is not linked to an institute yet. Contact your administrator.');

      const jobId = 'job_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
      const filePaths = selectedFiles.map(f => `${instituteId}/${jobId}/${f.name}`);
      const fileUrls  = [];

      // 1. Ask n8n for short-lived presigned upload/download URLs (no credentials in browser)
      const presignRes = await fetch(N8N_PRESIGN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keys: filePaths, expires: 3600 })
      });
      if (!presignRes.ok) throw new Error(`Could not get upload URLs: ${presignRes.status}`);
      const { signed } = await presignRes.json();
      if (!signed || signed.length !== filePaths.length) throw new Error('Upload URL response was incomplete.');

      // 2. Upload each file straight to IDrive via its presigned PUT URL
      for (let i = 0; i < selectedFiles.length; i++) {
        const f = selectedFiles[i];
        showProgress(10 + Math.round((i / selectedFiles.length) * 60), `Uploading ${f.name}...`);
        const put = await fetch(signed[i].putUrl, {
          method: 'PUT',
          headers: { 'Content-Type': f.type },
          body: f
        });
        if (!put.ok) throw new Error(`Upload failed for ${f.name}: ${put.status}`);
        fileUrls.push(signed[i].getUrl);
      }

      showProgress(85, 'Starting processing...');

      const jobPayload = {
        id: jobId,
        teacher_id:   currentUser.id,
        institute_id: instituteId,
        subject:      subject,
        class:        cls,
        unit:         document.getElementById('unit').value.trim(),
        topic:        document.getElementById('topic').value.trim(),
        notes:        document.getElementById('notes').value.trim(),
        file_paths:   filePaths,
        status:       'QUEUED',
        created_at:   new Date().toISOString()
      };

      // n8n creates the job record (server-side, with its own DB key) and runs the pipeline.
      // The browser never holds any privileged Supabase key.
      const hookRes = await fetch(N8N_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ job_id: jobId, file_paths: filePaths, file_urls: fileUrls, ...jobPayload })
      });
      if (!hookRes.ok) {
        throw new Error(`Could not start processing: ${hookRes.status}. Files were uploaded; please retry.`);
      }

      showProgress(100, 'Done!');
      showStatus('success',
        '<i class="ph ph-check-circle"></i> Submitted successfully',
        `Job ID: ${jobId} · ${filePaths.length} file(s) uploaded to IDrive S3 · Processing started.`
      );
      selectedFiles = [];
      fileInput.value = '';
      setTimeout(() => renderFileList(), 800);

    } catch (err) {
      showStatus('error', '<i class="ph ph-warning-circle"></i> Submission failed', err.message);
    } finally {
      setLoading(false);
      setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; }, 1500);
    }
  }

  // ── UI helpers ──────────────────────────────────────────
  function setLoading(on) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<i class="ph ph-spinner-gap" style="animation:spin 0.8s linear infinite"></i> Processing...'
      : '<i class="ph ph-paper-plane-tilt"></i> Submit for Processing';
  }

  function showProgress(pct, label) {
    const wrap = document.getElementById('progressWrap');
    wrap.style.display = 'block';
    document.getElementById('progressText').textContent = label;
    document.getElementById('progressPct').textContent  = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function showStatus(type, title, meta) {
    const card = document.getElementById('statusCard');
    card.className = 'status-card ' + type;
    card.style.display = 'block';
    document.getElementById('statusTitle').innerHTML = title;
    document.getElementById('statusMeta').textContent  = meta;
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Init ────────────────────────────────────────────────
  checkAuth();
</script>
</body>
</html>
